<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>J.A.R.V.I.S — Iron Man</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --red:    #ff1a1a;
  --red2:   #cc0000;
  --gold:   #ffd700;
  --gold2:  #c8a800;
  --dim:    rgba(255,26,26,0.18);
  --dimG:   rgba(255,215,0,0.15);
  --bg:     #0a0000;
  --panel:  #0f0000;
}

html, body {
  height: 100%; background: var(--bg);
  color: var(--red); font-family: 'Share Tech Mono', monospace;
  overflow: hidden;
}

/* ── HUD SCANLINES ── */
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 999; pointer-events: none;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
}

#bg-canvas { position: fixed; inset: 0; z-index: 0; }

/* ── SHELL ── */
.shell { position: relative; z-index: 1; height: 100vh; display: grid; grid-template-rows: auto 1fr auto; }

/* ── HEADER ── */
header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 0.9rem 1.6rem;
  border-bottom: 1px solid var(--dim);
  background: rgba(10,0,0,0.85);
  backdrop-filter: blur(14px);
  z-index: 10;
}
.logo {
  font-family: 'Orbitron', monospace; font-size: 15px; font-weight: 800;
  letter-spacing: 4px; color: var(--red);
  text-shadow: 0 0 12px rgba(255,26,26,0.6);
}
.logo span { color: var(--gold); text-shadow: 0 0 10px rgba(255,215,0,0.5); }
.header-right { display: flex; align-items: center; gap: 1.2rem; }
.sys-info { display: flex; gap: 1.4rem; font-size: 10px; opacity: 0.45; color: var(--gold); }
.sys-dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: var(--gold); margin-right: 5px; animation: blink 2s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }

.apps-btn {
  font-family: 'Orbitron', monospace; font-size: 10px; font-weight: 600; letter-spacing: 2px;
  color: var(--gold); background: rgba(255,215,0,0.07);
  border: 1px solid rgba(255,215,0,0.3); border-radius: 3px;
  padding: 7px 16px; cursor: pointer; user-select: none;
  transition: all 0.2s;
  text-shadow: 0 0 8px rgba(255,215,0,0.3);
}
.apps-btn:hover, .apps-btn.open {
  background: rgba(255,215,0,0.14); border-color: var(--gold); color: #fff;
  box-shadow: 0 0 12px rgba(255,215,0,0.2);
}

/* ── OVERLAY ── */
.panel-overlay { position: fixed; inset: 0; z-index: 50; background: rgba(0,0,0,0.65); opacity: 0; pointer-events: none; transition: opacity 0.3s; }
.panel-overlay.show { opacity: 1; pointer-events: all; }

/* ── SIDE PANEL ── */
.side-panel {
  position: fixed; top: 0; right: 0; bottom: 0; width: 360px; z-index: 51;
  background: #0c0000;
  border-left: 1px solid rgba(255,26,26,0.25);
  display: flex; flex-direction: column;
  transform: translateX(100%); transition: transform 0.35s cubic-bezier(.4,0,.2,1);
}
.side-panel.show { transform: translateX(0); }

.panel-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 1rem 1.2rem;
  border-bottom: 1px solid rgba(255,26,26,0.15);
  flex-shrink: 0;
  background: rgba(255,26,26,0.04);
}
.panel-title {
  font-family: 'Orbitron', monospace; font-size: 11px; font-weight: 600;
  letter-spacing: 4px; color: var(--red);
  text-shadow: 0 0 8px rgba(255,26,26,0.5);
}
.panel-close { font-size: 16px; cursor: pointer; color: rgba(255,26,26,0.4); background: none; border: none; transition: color 0.2s; }
.panel-close:hover { color: var(--red); }

/* ADD FORM */
.panel-add {
  padding: 0.9rem 1.2rem;
  border-bottom: 1px solid rgba(255,26,26,0.1);
  flex-shrink: 0;
}
.panel-add-title { font-size: 9px; letter-spacing: 3px; color: rgba(255,215,0,0.4); margin-bottom: 8px; text-transform: uppercase; }
.field-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 7px; }
.field-row input {
  background: rgba(255,26,26,0.04); border: 1px solid rgba(255,26,26,0.18);
  border-radius: 2px; color: #ffaaaa;
  font-family: 'Share Tech Mono', monospace; font-size: 11px;
  padding: 7px 10px; outline: none; transition: border-color 0.2s;
}
.field-row input::placeholder { color: rgba(255,26,26,0.22); }
.field-row input:focus { border-color: rgba(255,26,26,0.45); }
.add-btn {
  width: 100%; font-family: 'Orbitron', monospace; font-size: 10px; font-weight: 600; letter-spacing: 2px;
  color: #000; background: var(--red); border: none; border-radius: 2px;
  padding: 8px; cursor: pointer; transition: opacity 0.2s, box-shadow 0.2s;
  text-transform: uppercase;
}
.add-btn:hover { opacity: 0.85; box-shadow: 0 0 12px rgba(255,26,26,0.4); }
.add-err { font-size: 10px; color: var(--gold); margin-top: 4px; min-height: 14px; }

/* APP LIST */
.apps-list { flex: 1; overflow-y: auto; }
.apps-list::-webkit-scrollbar { width: 3px; }
.apps-list::-webkit-scrollbar-thumb { background: rgba(255,26,26,0.2); }

/* TABS */
.tabs { display: flex; border-bottom: 1px solid rgba(255,26,26,0.12); flex-shrink: 0; }
.tab-btn {
  flex: 1; font-family: 'Orbitron', monospace; font-size: 9px; font-weight: 600;
  letter-spacing: 2px; padding: 8px; cursor: pointer;
  background: transparent; border: none; color: rgba(255,26,26,0.35);
  transition: all 0.2s; border-bottom: 2px solid transparent;
}
.tab-btn.active { color: var(--red); border-bottom-color: var(--red); background: rgba(255,26,26,0.04); }

.app-item {
  display: flex; align-items: center; gap: 9px;
  padding: 8px 1.1rem;
  border-bottom: 1px solid rgba(255,26,26,0.06);
  transition: background 0.15s; cursor: pointer;
}
.app-item:hover { background: rgba(255,26,26,0.06); }
.app-favicon {
  width: 26px; height: 26px; border-radius: 3px;
  background: rgba(255,26,26,0.08); border: 1px solid rgba(255,26,26,0.12);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; flex-shrink: 0; overflow: hidden; color: var(--red);
}
.app-favicon img { width: 100%; height: 100%; object-fit: cover; border-radius: 2px; }
.app-info { flex: 1; min-width: 0; }
.app-name { font-family: 'Orbitron', monospace; font-size: 11px; font-weight: 600; color: #ffaaaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.app-url { font-size: 9px; color: rgba(255,26,26,0.28); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.app-actions { display: flex; gap: 4px; flex-shrink: 0; }
.app-open-btn, .app-del-btn {
  font-family: 'Share Tech Mono', monospace; font-size: 9px; letter-spacing: 1px;
  border-radius: 2px; padding: 3px 7px; cursor: pointer; border: 1px solid; line-height: 1.4; transition: all 0.2s;
}
.app-open-btn { color: var(--gold); border-color: rgba(255,215,0,0.2); background: rgba(255,215,0,0.04); }
.app-open-btn:hover { background: rgba(255,215,0,0.12); }
.app-del-btn { color: rgba(255,100,100,0.4); border-color: rgba(255,26,26,0.1); background: transparent; }
.app-del-btn:hover { color: var(--red); border-color: rgba(255,26,26,0.4); }
.empty-apps { text-align: center; padding: 2rem 1rem; font-size: 10px; color: rgba(255,26,26,0.2); line-height: 2.2; }

/* ── MAIN ── */
main { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.4rem; padding: 1rem; position: relative; }

/* IRON MAN CHEST RT */
.chest-wrapper {
  position: relative; width: 260px; height: 260px;
  display: flex; align-items: center; justify-content: center;
}

/* outer hex rings */
.hex-ring {
  position: absolute; border-radius: 50%; border: 1px solid;
}
.hex-ring1 { width: 100%; height: 100%; border-color: rgba(255,26,26,0.2); animation: spin 16s linear infinite; }
.hex-ring1::before { content:''; position:absolute; inset:-1px; border-radius:50%; border:2px solid var(--red); clip-path:polygon(0 0,35% 0,35% 100%,0 100%); opacity:0.7; }
.hex-ring2 { width: 83%; height: 83%; border-color: rgba(255,26,26,0.12); animation: spin 11s linear infinite reverse; }
.hex-ring2::before { content:''; position:absolute; inset:-1px; border-radius:50%; border:1.5px solid rgba(255,215,0,0.6); clip-path:polygon(65% 0,100% 0,100% 55%,65% 55%); }
.hex-ring3 { width: 67%; height: 67%; border-color: rgba(255,215,0,0.1); animation: spin 7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* arc reactor */
.arc-reactor {
  position: relative; z-index: 5;
  width: 112px; height: 112px; border-radius: 50%;
  cursor: pointer; user-select: none;
  transition: box-shadow 0.3s;
  display: flex; align-items: center; justify-content: center;
}
.arc-reactor:hover { box-shadow: 0 0 40px rgba(255,26,26,0.5); }
.arc-reactor.listening { animation: pulse-red 1.1s ease-in-out infinite; }
.arc-reactor.error-state { box-shadow: 0 0 30px rgba(255,215,0,0.4); }
@keyframes pulse-red { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }

/* SVG reactor face */
.reactor-svg { width: 112px; height: 112px; }

/* ── WAVE BARS ── */
.wave-bars { display:flex; align-items:flex-end; gap:3px; height:26px; opacity:0; transition:opacity 0.3s; }
.wave-bars.active { opacity:1; }
.wave-bars span { display:block; width:3px; background:var(--red); border-radius:2px; min-height:4px; animation:wave 0.75s ease-in-out infinite; }
.wave-bars span:nth-child(1){animation-delay:0s}.wave-bars span:nth-child(2){animation-delay:.1s}.wave-bars span:nth-child(3){animation-delay:.2s}.wave-bars span:nth-child(4){animation-delay:.1s}.wave-bars span:nth-child(5){animation-delay:0s}
@keyframes wave { 0%,100%{height:4px} 50%{height:22px} }

/* STATUS */
.status-label { font-family:'Orbitron',monospace; font-size:10px; font-weight:600; letter-spacing:3px; color:var(--red); opacity:0.45; text-transform:uppercase; text-align:center; min-height:16px; transition:color .3s,opacity .3s; }
.status-label.active { opacity:1; color:var(--gold); text-shadow:0 0 8px rgba(255,215,0,0.5); }
.status-label.error  { opacity:1; color:var(--red); text-shadow:0 0 8px rgba(255,26,26,0.5); }

.transcript { font-size:13px; color:#ffaaaa; text-align:center; min-height:20px; max-width:460px; line-height:1.5; opacity:0; transform:translateY(4px); transition:opacity .3s,transform .3s; }
.transcript.show { opacity:1; transform:none; }

.response { font-family:'Orbitron',monospace; font-size:12px; font-weight:600; letter-spacing:1px; color:var(--gold); text-align:center; min-height:20px; max-width:460px; opacity:0; transform:translateY(4px); transition:opacity .3s,transform .3s; text-shadow:0 0 8px rgba(255,215,0,0.4); }
.response.show { opacity:1; transform:none; }
.response.error-msg { color:var(--red); text-shadow:0 0 8px rgba(255,26,26,0.4); }

/* PILLS */
.sites { display:flex; flex-wrap:wrap; gap:5px; justify-content:center; max-width:520px; }
.pill { font-size:9px; letter-spacing:1px; color:rgba(255,26,26,0.38); border:1px solid rgba(255,26,26,0.1); border-radius:2px; padding:3px 9px; text-transform:uppercase; transition:color .2s,border-color .2s; cursor:default; }
.pill:hover { color:var(--gold); border-color:rgba(255,215,0,0.3); }

/* FOOTER */
footer { display:flex; justify-content:center; padding:0.8rem 2rem; border-top:1px solid var(--dim); background:rgba(10,0,0,0.8); backdrop-filter:blur(10px); }
.hint { font-size:9px; letter-spacing:2px; color:rgba(255,26,26,0.22); text-align:center; }
.hint strong { color:rgba(255,215,0,0.4); }

/* CORNER DECORATIONS */
.corner { position:fixed; width:40px; height:40px; z-index:2; pointer-events:none; }
.corner-tl { top:0; left:0; border-top:2px solid rgba(255,26,26,0.35); border-left:2px solid rgba(255,26,26,0.35); }
.corner-tr { top:0; right:0; border-top:2px solid rgba(255,26,26,0.35); border-right:2px solid rgba(255,26,26,0.35); }
.corner-bl { bottom:0; left:0; border-bottom:2px solid rgba(255,26,26,0.35); border-left:2px solid rgba(255,26,26,0.35); }
.corner-br { bottom:0; right:0; border-bottom:2px solid rgba(255,26,26,0.35); border-right:2px solid rgba(255,26,26,0.35); }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<!-- PANEL OVERLAY -->
<div class="panel-overlay" id="panelOverlay" onclick="closePanel()"></div>

<!-- SIDE PANEL -->
<div class="side-panel" id="sidePanel">
  <div class="panel-header">
    <span class="panel-title">⬡ STARK APPS</span>
    <button class="panel-close" onclick="closePanel()">✕</button>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" id="tabDefault" onclick="switchTab('default')">DEFAULT (50)</button>
    <button class="tab-btn" id="tabCustom" onclick="switchTab('custom')">MY APPS</button>
  </div>

  <!-- ADD FORM (custom tab only) -->
  <div class="panel-add" id="addForm" style="display:none">
    <div class="panel-add-title">ADD NEW APP</div>
    <div class="field-row">
      <input type="text" id="appName" placeholder="Name  (e.g. My Bank)" autocomplete="off" />
      <input type="text" id="appUrl"  placeholder="URL   (e.g. https://hdfcbank.com)" autocomplete="off" />
    </div>
    <button class="add-btn" onclick="addApp()">+ ADD TO STARK APPS</button>
    <div class="add-err" id="addErr"></div>
  </div>

  <div class="apps-list" id="appsList"></div>
</div>

<!-- SHELL -->
<div class="shell">
  <header>
    <div class="logo">J.A.R.V.I.S <span>// STARK INDUSTRIES</span></div>
    <div class="header-right">
      <div class="sys-info">
        <span><span class="sys-dot"></span>ONLINE</span>
        <span id="clock">--:--:--</span>
      </div>
      <button class="apps-btn" id="appsBtn" onclick="togglePanel()">⬡ APPS</button>
    </div>
  </header>

  <main>
    <div class="chest-wrapper">
      <div class="hex-ring hex-ring1"></div>
      <div class="hex-ring hex-ring2"></div>
      <div class="hex-ring hex-ring3"></div>

      <!-- Iron Man Arc Reactor SVG -->
      <div class="arc-reactor" id="arcReactor" onclick="toggleListen()" title="Engage JARVIS">
        <svg class="reactor-svg" viewBox="0 0 112 112" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="bgGrad" cx="50%" cy="45%" r="55%">
              <stop offset="0%" stop-color="#3a0000"/>
              <stop offset="60%" stop-color="#1a0000"/>
              <stop offset="100%" stop-color="#060000"/>
            </radialGradient>
            <radialGradient id="coreGrad" cx="40%" cy="38%" r="60%">
              <stop offset="0%" stop-color="#ff6666"/>
              <stop offset="40%" stop-color="#ff1a1a"/>
              <stop offset="100%" stop-color="#660000"/>
            </radialGradient>
            <radialGradient id="goldGrad" cx="40%" cy="38%" r="60%">
              <stop offset="0%" stop-color="#ffe066"/>
              <stop offset="60%" stop-color="#ffd700"/>
              <stop offset="100%" stop-color="#a06800"/>
            </radialGradient>
            <filter id="glow">
              <feGaussianBlur stdDeviation="2.5" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <filter id="goldGlow">
              <feGaussianBlur stdDeviation="2" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>

          <!-- outer body ring -->
          <circle cx="56" cy="56" r="54" fill="url(#bgGrad)" stroke="#cc0000" stroke-width="1.5"/>

          <!-- gold outer band -->
          <circle cx="56" cy="56" r="51" fill="none" stroke="url(#goldGrad)" stroke-width="3" stroke-dasharray="8 4" filter="url(#goldGlow)" opacity="0.7"/>

          <!-- iron plate segments -->
          <circle cx="56" cy="56" r="46" fill="none" stroke="#440000" stroke-width="1"/>
          <line x1="56" y1="10" x2="56" y2="102" stroke="#330000" stroke-width="0.7"/>
          <line x1="10" y1="56" x2="102" y2="56" stroke="#330000" stroke-width="0.7"/>
          <line x1="21" y1="21" x2="91" y2="91" stroke="#330000" stroke-width="0.7"/>
          <line x1="91" y1="21" x2="21" y2="91" stroke="#330000" stroke-width="0.7"/>

          <!-- triangular armor panels -->
          <polygon points="56,14 80,40 56,40" fill="#1e0000" stroke="#660000" stroke-width="0.8"/>
          <polygon points="56,98 80,72 56,72" fill="#1e0000" stroke="#660000" stroke-width="0.8"/>
          <polygon points="14,56 40,32 40,56" fill="#1e0000" stroke="#660000" stroke-width="0.8"/>
          <polygon points="98,56 72,32 72,56" fill="#1e0000" stroke="#660000" stroke-width="0.8"/>
          <polygon points="56,14 32,40 56,40" fill="#180000" stroke="#550000" stroke-width="0.8"/>
          <polygon points="56,98 32,72 56,72" fill="#180000" stroke="#550000" stroke-width="0.8"/>
          <polygon points="14,56 40,80 40,56" fill="#180000" stroke="#550000" stroke-width="0.8"/>
          <polygon points="98,56 72,80 72,56" fill="#180000" stroke="#550000" stroke-width="0.8"/>

          <!-- gold accent ring -->
          <circle cx="56" cy="56" r="37" fill="none" stroke="url(#goldGrad)" stroke-width="2.5" filter="url(#goldGlow)" opacity="0.9"/>

          <!-- inner dark ring -->
          <circle cx="56" cy="56" r="33" fill="#0a0000" stroke="#880000" stroke-width="1"/>

          <!-- ARC REACTOR CORE -->
          <!-- triangular reactor symbol -->
          <polygon points="56,30 78,70 34,70" fill="none" stroke="url(#goldGrad)" stroke-width="2" filter="url(#goldGlow)" opacity="0.85"/>
          <polygon points="56,42 70,66 42,66" fill="rgba(255,26,26,0.15)" stroke="#ff4444" stroke-width="1.2" filter="url(#glow)"/>

          <!-- center glow core -->
          <circle cx="56" cy="56" r="12" fill="url(#coreGrad)" filter="url(#glow)"/>
          <circle cx="56" cy="56" r="7" fill="#ff6666" filter="url(#glow)" opacity="0.9"/>
          <circle cx="56" cy="56" r="3.5" fill="#ffdddd"/>

          <!-- mic icon text -->
          <text x="56" y="92" text-anchor="middle" font-family="Share Tech Mono" font-size="8" fill="rgba(255,26,26,0.4)" letter-spacing="1">TAP</text>
        </svg>
      </div>
    </div>

    <div class="wave-bars" id="waveBars">
      <span></span><span></span><span></span><span></span><span></span>
    </div>

    <div class="status-label" id="statusLabel">SYSTEM STANDBY</div>
    <div class="transcript" id="transcript"></div>
    <div class="response"   id="response"></div>
    <div class="sites"      id="sitesGrid"></div>
  </main>

  <footer>
    <p class="hint">Say <strong>"JARVIS OPEN YOUTUBE"</strong> &nbsp;·&nbsp; Add custom sites via <strong>⬡ APPS</strong> &nbsp;·&nbsp; Chrome &amp; Edge only</p>
  </footer>
</div>

<script>
/* ══ CANVAS — red particle field ══ */
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let W, H, pts = [];
function resize(){ W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
resize(); window.addEventListener('resize', resize);
class Pt {
  constructor(){ this.reset(); }
  reset(){ this.x=Math.random()*W; this.y=Math.random()*H; this.r=Math.random()*1.1+0.2; this.a=Math.random()*Math.PI*2; this.s=Math.random()*0.25+0.04; this.op=Math.random()*0.45+0.08; this.isGold=Math.random()<0.12; }
  update(){ this.x+=Math.cos(this.a)*this.s; this.y+=Math.sin(this.a)*this.s; if(this.x<0||this.x>W||this.y<0||this.y>H) this.reset(); }
  draw(){
    ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.fillStyle = this.isGold ? `rgba(255,215,0,${this.op*0.7})` : `rgba(255,26,26,${this.op})`;
    ctx.fill();
  }
}
for(let i=0;i<140;i++) pts.push(new Pt());
(function loop(){ ctx.clearRect(0,0,W,H); pts.forEach(p=>{p.update();p.draw();}); requestAnimationFrame(loop); })();

/* ══ REACTOR PULSE ANIMATION ══ */
let reactorPulse = 0;
(function reactorLoop(){
  reactorPulse += 0.04;
  const core = document.querySelector('.reactor-svg circle:last-of-type');
  if(core){
    const intensity = 0.85 + Math.sin(reactorPulse)*0.15;
    core.style.opacity = intensity;
  }
  requestAnimationFrame(reactorLoop);
})();

/* ══ CLOCK ══ */
function tick(){ document.getElementById('clock').textContent = new Date().toTimeString().slice(0,8); }
tick(); setInterval(tick,1000);

/* ══ DEFAULT 50 SITES ══ */
const DEFAULT_APPS = [
  {name:'Google',        url:'https://www.google.com'},
  {name:'YouTube',       url:'https://www.youtube.com'},
  {name:'Facebook',      url:'https://www.facebook.com'},
  {name:'Instagram',     url:'https://www.instagram.com'},
  {name:'ChatGPT',       url:'https://chatgpt.com'},
  {name:'WhatsApp Web',  url:'https://web.whatsapp.com'},
  {name:'X (Twitter)',   url:'https://x.com'},

const BUILTIN = {};
DEFAULT_APPS.forEach(a => { BUILTIN[a.name.toLowerCase()] = a.url; });
// extra aliases
const ALIASES = {
  'whatsapp':'https://web.whatsapp.com','twitter':'https://x.com','maps':'https://maps.google.com',
  'drive':'https://drive.google.com','docs':'https://docs.google.com','translate':'https://translate.google.com',

  'ola cabs':'https://www.olacabs.com',
};
const ALL_BUILTIN = Object.assign({}, BUILTIN, ALIASES);

/* ══ CUSTOM APPS ══ */
function loadCustom(){ try{ return JSON.parse(localStorage.getItem('jarvis_custom')||'[]'); }catch(e){ return []; } }
function saveCustom(a){ try{ localStorage.setItem('jarvis_custom',JSON.stringify(a)); }catch(e){} }
function getDomain(url){ try{ return new URL(url).hostname.replace('www.',''); }catch(e){ return url; } }
function getFavicon(url){ try{ return `https://www.google.com/s2/favicons?sz=64&domain=${new URL(url).origin}`; }catch(e){ return ''; } }
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

let currentTab = 'default';

function switchTab(tab){
  currentTab = tab;
  document.getElementById('tabDefault').classList.toggle('active', tab==='default');
  document.getElementById('tabCustom').classList.toggle('active', tab==='custom');
  document.getElementById('addForm').style.display = tab==='custom' ? 'block' : 'none';
  renderList();
}

function renderList(){
  const list = document.getElementById('appsList');
  list.innerHTML = '';
  if(currentTab === 'default'){
    DEFAULT_APPS.forEach(app => {
      list.appendChild(makeAppItem(app, false));
    });
  } else {
    const custom = loadCustom();
    if(!custom.length){
      list.innerHTML = `<div class="empty-apps">No custom apps yet.<br/>Add a name &amp; URL above<br/>then say it to open!</div>`;
      return;
    }
    custom.forEach((app, i) => list.appendChild(makeAppItem(app, true, i)));
  }
}

function makeAppItem(app, deletable, idx){
  const item = document.createElement('div');
  item.className = 'app-item';

  const fav = document.createElement('div'); fav.className = 'app-favicon';
  const furl = getFavicon(app.url);
  if(furl){ const img=document.createElement('img'); img.src=furl; img.onerror=()=>{fav.innerHTML='';fav.textContent=app.name.charAt(0).toUpperCase();}; fav.appendChild(img); }
  else fav.textContent = app.name.charAt(0).toUpperCase();

  const info = document.createElement('div'); info.className='app-info';
  info.innerHTML = `<div class="app-name">${esc(app.name)}</div><div class="app-url">${esc(getDomain(app.url))}</div>`;

  const actions = document.createElement('div'); actions.className='app-actions';
  const ob = document.createElement('button'); ob.className='app-open-btn'; ob.textContent='OPEN';
  ob.onclick = e=>{ e.stopPropagation(); window.open(app.url,'_blank'); };
  actions.appendChild(ob);

  if(deletable){
    const db = document.createElement('button'); db.className='app-del-btn'; db.textContent='✕';
    db.onclick = e=>{ e.stopPropagation(); deleteCustom(idx); };
    actions.appendChild(db);
  }

  item.append(fav, info, actions);
  return item;
}

function addApp(){
  const nameEl=document.getElementById('appName'), urlEl=document.getElementById('appUrl'), errEl=document.getElementById('addErr');
  const name=nameEl.value.trim(); let url=urlEl.value.trim();
  errEl.textContent='';
  if(!name){ errEl.textContent='Enter a name.'; return; }
  if(!url)  { errEl.textContent='Enter a URL.';  return; }
  if(!/^https?:\/\//i.test(url)) url='https://'+url;
  try{ new URL(url); } catch(e){ errEl.textContent='Invalid URL.'; return; }
  const apps=loadCustom(); apps.unshift({name,url}); saveCustom(apps);
  nameEl.value=''; urlEl.value='';
  renderList();
  speak('App added: '+name);
}

function deleteCustom(i){
  const apps=loadCustom(); apps.splice(i,1); saveCustom(apps); renderList();
}

document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('appName').addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('appUrl').focus(); });
  document.getElementById('appUrl').addEventListener('keydown', e=>{ if(e.key==='Enter') addApp(); });
  renderList();
});

/* ══ SPEECH ══ */
let recognition=null, listening=false;

function setStatus(t,mode){ const el=document.getElementById('statusLabel'); el.textContent=t; el.className='status-label'+(mode?' '+mode:''); }
function showTranscript(t){ const el=document.getElementById('transcript'); el.textContent=t; el.classList.toggle('show',!!t); }
function showResponse(t,isErr){ const el=document.getElementById('response'); el.textContent=t; el.className='response'+(t?' show':'')+(isErr?' error-msg':''); }
function setListeningUI(val){
  listening=val;
  const reactor=document.getElementById('arcReactor'), waves=document.getElementById('waveBars');
  if(val){ reactor.classList.add('listening'); reactor.classList.remove('error-state'); waves.classList.add('active'); }
  else   { reactor.classList.remove('listening'); waves.classList.remove('active'); }
}
function speak(text){
  if(!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.rate=1.05; u.pitch=0.75; u.volume=1;
  speechSynthesis.speak(u);
}

function parseIntent(raw){
  let text=raw.toLowerCase().trim();
  text=text.replace(/^(jarvis[,]?\s*)/,'').trim();
  const opens=['open','go to','go','launch','show me','take me to','navigate to','visit','load'];
  for(const o of opens){ if(text.startsWith(o+' ')){ text=text.slice(o.length).trim(); break; } }
  text=text.replace(/^(the|a|an)\s+/,'').trim();

  if(/\.(com|org|net|io|in|co\.in|tv|me|gov)$/.test(text)) return {name:text,url:'https://'+text};

  // custom first
  for(const app of loadCustom()){
    const n=app.name.toLowerCase();
    if(n===text||text.includes(n)||n.includes(text)) return {name:app.name,url:app.url};
  }
  // default
  if(ALL_BUILTIN[text]) return {name:text,url:ALL_BUILTIN[text]};
  for(const [k,v] of Object.entries(ALL_BUILTIN)){
    if(text.includes(k)||k.includes(text)) return {name:k,url:v};
  }
  return null;
}

function processCommand(raw){
  showTranscript('"'+raw+'"');
  setStatus('PROCESSING...','active');
  const res=parseIntent(raw);
  if(res){
    const name=res.name.replace(/\b\w/g,c=>c.toUpperCase());
    showResponse('LAUNCHING '+name.toUpperCase());
    setStatus('ENGAGING TARGET','active');
    speak('Launching '+name);
    setTimeout(()=>{ window.open(res.url,'_blank'); setStatus('SYSTEM STANDBY'); showResponse(''); },1100);
  } else {
    showResponse('TARGET NOT FOUND. ADD IT VIA APPS.', true);
    setStatus('UNRECOGNIZED','error');
    document.getElementById('arcReactor').classList.add('error-state');
    speak('Target not recognized. You can add it in the Apps panel.');
    setTimeout(()=>{ setStatus('SYSTEM STANDBY'); document.getElementById('arcReactor').classList.remove('error-state'); showResponse(''); },3500);
  }
}

function toggleListen(){
  if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){
    showResponse('VOICE SYSTEMS OFFLINE. USE CHROME OR EDGE.',true);
    setStatus('HARDWARE ERROR','error'); return;
  }
  if(listening){ recognition&&recognition.stop(); setListeningUI(false); setStatus('SYSTEM STANDBY'); return; }
  showTranscript(''); showResponse('');
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR(); recognition.lang='en-US'; recognition.interimResults=true; recognition.maxAlternatives=3;
  recognition.onstart=()=>{ setListeningUI(true); setStatus('LISTENING...','active'); speak('Yes sir?'); };
  recognition.onresult=(e)=>{
    let interim='',final='';
    for(let i=e.resultIndex;i<e.results.length;i++){ const t=e.results[i][0].transcript; e.results[i].isFinal?(final+=t):(interim+=t); }
    showTranscript('"'+(final||interim)+'"');
    if(final){ recognition.stop(); setListeningUI(false); processCommand(final); }
  };
  recognition.onerror=(e)=>{
    setListeningUI(false);
    if(e.error==='no-speech'){ setStatus('NO SIGNAL DETECTED','error'); setTimeout(()=>setStatus('SYSTEM STANDBY'),2000); }
    else if(e.error==='not-allowed'){ showResponse('MICROPHONE ACCESS DENIED.',true); setStatus('ACCESS DENIED','error'); }
    else setStatus('SYSTEM STANDBY');
  };
  recognition.onend=()=>setListeningUI(false);
  recognition.start();
}

document.addEventListener('keydown',e=>{
  if(e.code==='Space'&&e.target===document.body){ e.preventDefault(); toggleListen(); }
  if(e.key==='Escape') closePanel();
});
